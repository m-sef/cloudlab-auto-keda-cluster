#==============================================================================
# Author(s): Seth Moore (slmoore@hamilton.edu)
# Brief: nginx deployment utilizing KEDA Prometheus Scaler
#==============================================================================
apiVersion: v1
kind: Namespace
metadata:
  name: nginx
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-config
  namespace: nginx
data:
  nginx.conf: |
    server {
      listen 80;
      location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
      }
      location = /stub_status {
        stub_status;
      }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-deployment
  namespace: nginx
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nginx
  template:
    metadata:
      labels:
        app: nginx
    spec:
      containers:
      - name: nginx
        image: nginx:1.30
        ports:
        - containerPort: 80
        volumeMounts:
        - name: config-volume
          mountPath: /etc/nginx/conf.d/default.conf
          subPath: nginx.conf
      - name: nginx-prometheus-exporter
        image: 'nginx/nginx-prometheus-exporter:1.5.1'
        args:
          - '--nginx.scrape-uri=http://localhost/stub_status'
        ports:
        - containerPort: 9113
      volumes:
      - name: config-volume
        configMap:
          name: nginx-config
          defaultMode: 420
---
apiVersion: v1
kind: Service
metadata:
  name: nginx-service
  namespace: nginx
spec:
  selector:
    app: nginx
  ports:
  - protocol: TCP
    port: 80
    targetPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: nginx-exporter-service
  namespace: nginx
spec:
  selector:
    app: nginx
  ports:
  - protocol: TCP
    port: 9113
    targetPort: 9113
---
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: nginx-scaledobject
  namespace: nginx
spec:
  minReplicaCount: 2
  maxReplicaCount: 10
  scaleTargetRef:
    name: nginx-deployment
  triggers:
  - type: prometheus
    metadata:
      # Needs to be manually assigned
      serverAddress: http://prometheus-service.prometheus.svc.cluster.local:80
      threshold: '30'
      query: sum(rate(nginx_http_requests_total{job="nginx-exporter"}[1m]))
