# Brief: Modified flaw1.yaml from the ECKO experiments using KEDA Prometheus Scaler
# * WARNING - Catastrophically broken, DO NOT USE
#==============================================================================
apiVersion: v1
kind: Namespace
metadata:
  name: flaw1
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: app
  namespace: flaw1
spec:
  replicas: 2
  selector:
    matchLabels:
      app: app
  template:
    metadata:
      labels:
        app: app
    spec:
      containers:
      - name: app
        image: python:3.11-slim
        command:
        - python3
        - -c
        - |
          from http.server import HTTPServer, BaseHTTPRequestHandler
          from socketserver import ThreadingMixIn
          import time, math, threading

          total = 0
          lock = threading.Lock()

          class ThreadingHTTPServer(ThreadingMixIn, HTTPServer): pass

          class H(BaseHTTPRequestHandler):
              def do_GET(self):
                  global total
                  if self.path == '/metrics':
                      with lock:
                          n = total
                      body = f'# TYPE http_requests_total counter\nhttp_requests_total {n}\n'.encode()
                      self.send_response(200)
                      self.send_header('Content-Type', 'text/plain; version=0.0.4')
                      self.end_headers()
                      self.wfile.write(body)
                      return
                  with lock:
                      total += 1
                  d = float(self.path.split("burn=")[-1]) / 1000 if "burn=" in self.path else 0.02
                  t = time.time() + d
                  x = 0.0
                  while time.time() < t:
                      x += math.sqrt(x + 1)
                  self.send_response(200)
                  self.end_headers()
                  self.wfile.write(b"ok")
              def log_message(self, *a): pass

          ThreadingHTTPServer(("0.0.0.0", 8080), H).serve_forever()
        ports:
        - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: app
  namespace: flaw1
spec:
  selector:
    app: app
  ports:
  - port: 80
    targetPort: 8080
---
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: flaw1-scaledobject
  namespace: flaw1
spec:
  minReplicaCount: 2
  maxReplicaCount: 10
  scaleTargetRef:
    name: app
  triggers:
  - type: prometheus
    metadata:
      serverAddress: http://prometheus-service.prometheus.svc.cluster.local:80
      threshold: '10'
      query: sum(rate(http_requests_total{job="flaw1-app"}[1m]))
